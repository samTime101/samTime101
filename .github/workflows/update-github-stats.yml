name: Update GitHub Stats Image

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Download GitHub Stats SVG
        run: |
          mkdir -p assets
          curl -L "https://stats.pphat.top/stats?username=samTime101&avatar_mode=radar&theme=default&data_border_style=frame" -o assets/github-stats.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg
          git diff-index --quiet HEAD || git commit -m "Update GitHub stats image"
          git push origin main
